jwt:
  secret: &jwt-secret ${JWT_SECRET}
  key-id: my-key-id

spring:
  application:
    name: streamer-api
    security:
      oauth2:
        resourceserver:
          jwt:
            secret: *jwt-secret
  datasource:
    url: jdbc:postgresql://localhost:5432/tinyflix?TimeZone=UTC
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect


bypass:
  urls:
    - /auth/**
    - /actuator/**

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  github:
    client-id: ${GITHUB_CLIENT_ID}


management:
  endpoints:
    web:
      exposure:
        include: health

aws:
  s3:
    access-key: ${S3_BUCKET_ACCESS_KEY}
    secret-key: ${S3_BUCKET_SECRET_KEY}
    region: ${S3_BUCKET_REGION}
    bucket-name: ${S3_BUCKET_NAME}
